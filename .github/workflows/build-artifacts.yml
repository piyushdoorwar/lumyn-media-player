name: Build release artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-linux-amd64-deb
          path: artifacts/packages/*.deb

  windows-zip:
    name: Windows portable zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build portable zip
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-windows-x64-portable
          path: artifacts/packages/*.zip
