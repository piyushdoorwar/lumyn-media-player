name: Build release artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: "0.0.0-dev"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run unit tests
        run: dotnet test Lumyn.sln --configuration Release

  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-linux-amd64-deb
          path: artifacts/packages/*.deb

  linux-snap:
    name: Linux Snap package
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Stage snapcraft project
        run: |
          mkdir -p snap/gui
          cp packaging/snap/snapcraft.yaml snap/snapcraft.yaml
          cp src/Lumyn.App/Assets/Icons/lumyn.svg snap/gui/icon.svg

      - name: Build snap
        id: build-snap
        uses: canonical/action-build@v1
        with:
          snapcraft-channel: 9.x/candidate

      - name: Verify bundled libmpv
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

          echo "Checking bundled libmpv files..."
          unsquashfs -ll "${{ steps.build-snap.outputs.snap }}" | grep 'libmpv' || {
            echo "libmpv was not bundled in the snap." >&2
            exit 1
          }

          echo "Checking expected Lumyn libmpv location..."
          unsquashfs -ll "${{ steps.build-snap.outputs.snap }}" | grep 'opt/lumyn/lib/libmpv.so.2' || {
            echo "opt/lumyn/lib/libmpv.so.2 is missing." >&2
            exit 1
          }

          echo "Checking app-local libmpv compatibility symlink..."
          unsquashfs -ll "${{ steps.build-snap.outputs.snap }}" | grep 'opt/lumyn/libmpv.so.2' || {
            echo "opt/lumyn/libmpv.so.2 compatibility symlink is missing." >&2
            exit 1
          }

          echo "Checking launcher exports bundled library paths..."
          unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" opt/lumyn/lumyn | grep 'opt/lumyn/lib' || {
            echo "launcher does not export opt/lumyn/lib in LD_LIBRARY_PATH." >&2
            exit 1
          }

          echo "Checking launcher exports BLAS/LAPACK library paths..."
          unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" opt/lumyn/lumyn | grep 'blas' || {
            echo "launcher does not export BLAS library paths." >&2
            exit 1
          }

          echo "Checking launcher exports cursor theme paths..."
          unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" opt/lumyn/lumyn | grep 'XCURSOR_PATH' || {
            echo "launcher does not export cursor theme paths." >&2
            exit 1
          }

      - name: Upload snap
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-linux-amd64-snap
          path: ${{ steps.build-snap.outputs.snap }}

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-windows-x64-installer
          path: artifacts/packages/*_setup.exe
