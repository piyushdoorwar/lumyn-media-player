name: Build release artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: "0.0.0-dev"

jobs:
  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-linux-amd64-deb
          path: artifacts/packages/*.deb

  linux-snap:
    name: Linux Snap package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Stage snapcraft project
        run: |
          mkdir -p snap/gui
          cp packaging/snap/snapcraft.yaml snap/snapcraft.yaml
          cp src/Lumyn.App/Assets/Icons/lumyn.svg snap/gui/icon.svg

      - name: Build snap
        id: build-snap
        uses: canonical/action-build@v1

      - name: Upload snap
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-linux-amd64-snap
          path: ${{ steps.build-snap.outputs.snap }}

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-windows-x64-installer
          path: artifacts/packages/*_setup.exe

  macos-zip:
    name: macOS app zip (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-15
          - rid: osx-x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: brew install mpv ffmpeg

      - name: Build app DMG
        run: RID=${{ matrix.rid }} ./scripts/build-macos.sh

      - name: Upload app DMG
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-macos-${{ matrix.rid }}
          path: artifacts/packages/*.dmg
