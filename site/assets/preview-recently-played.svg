  <line x1="14" y1="64" x2="306" y2="64" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ── Card 1 – video, 72% ──────────────────────────── -->
  <rect x="12" y="70" width="92" height="88" rx="5" fill="#151515" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- thumbnail -->
  <rect x="12" y="70" width="92" height="56" rx="5" fill="#0E1A0E"/>
  <rect x="12" y="70" width="92" height="56" rx="5" fill="url(#glow-rp-1)"/>
  <!-- scene suggestion -->
