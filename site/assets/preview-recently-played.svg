  <rect x="40" y="111" width="20" height="14" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- progress bar (72%) at bottom of thumbnail -->
  <rect x="12" y="123" width="92" height="3" fill="#1F1F1F"/>
  <rect x="12" y="123" width="66" height="3" fill="#3a9b4b"/>
