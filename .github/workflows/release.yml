name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 1.2.3 or 1.2.3-beta.1)'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: read

jobs:
  # ── Determine version from tag or manual input ────────────────────────────
  prepare:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Extract version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
            TAG="v${VERSION}"
          else
            # Strip 'v' prefix: v1.2.3 -> 1.2.3
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="$GITHUB_REF_NAME"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  # ── Platform builds ───────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ runner.arch }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-nuget-

      - name: Run unit tests
        run: dotnet test Lumyn.sln --configuration Release

  linux-deb:
    name: Linux Debian package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            rid: linux-x64
            runner: ubuntu-latest
          - arch: arm64
            rid: linux-arm64
            runner: ubuntu-24.04-arm
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RID: ${{ matrix.rid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ runner.arch }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-nuget-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv2

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-linux-${{ matrix.arch }}-deb
          path: artifacts/packages/*.deb

  linux-snap:
    name: Linux Snap package
    runs-on: ubuntu-latest
    needs: [prepare, unit-tests]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Stage snapcraft project
        run: |
          mkdir -p snap/gui
          cp packaging/snap/snapcraft.yaml snap/snapcraft.yaml
          cp src/Lumyn.App/Assets/Icons/lumyn.svg snap/gui/icon.svg
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("snap/snapcraft.yaml")
          text = path.read_text(encoding="utf-8")
          marker = "    override-build: |\n"
          version = os.environ["VERSION"]
          replacement = (
              "    build-environment:\n"
              f"      - VERSION: {json.dumps(version)}\n"
              f"{marker}"
          )
          if marker not in text:
              raise SystemExit("Could not find snapcraft override-build marker")
          path.write_text(text.replace(marker, replacement, 1), encoding="utf-8")
          PY

      - name: Build snap
        id: build-snap
        uses: canonical/action-build@v1
        with:
          snapcraft-channel: 9.x/candidate

      - name: Verify bundled libmpv
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

          echo "Checking bundled libmpv files..."
          unsquashfs -ll "${{ steps.build-snap.outputs.snap }}" | grep 'libmpv' || {
            echo "libmpv was not bundled in the snap." >&2
            exit 1
          }

          echo "Checking expected Lumyn libmpv location..."
          unsquashfs -ll "${{ steps.build-snap.outputs.snap }}" | grep 'opt/lumyn/lib/libmpv.so.2' || {
            echo "opt/lumyn/lib/libmpv.so.2 is missing." >&2
            exit 1
          }

          echo "Checking app-local libmpv compatibility symlink..."
          unsquashfs -ll "${{ steps.build-snap.outputs.snap }}" | grep 'opt/lumyn/libmpv.so.2' || {
            echo "opt/lumyn/libmpv.so.2 compatibility symlink is missing." >&2
            exit 1
          }

          echo "Checking launcher exports bundled library paths..."
          unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" opt/lumyn/lumyn | grep 'opt/lumyn/lib' || {
            echo "launcher does not export opt/lumyn/lib in LD_LIBRARY_PATH." >&2
            exit 1
          }

          echo "Checking launcher exports BLAS/LAPACK library paths..."
          unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" opt/lumyn/lumyn | grep 'blas' || {
            echo "launcher does not export BLAS library paths." >&2
            exit 1
          }

          echo "Checking launcher exports cursor theme paths..."
          unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" opt/lumyn/lumyn | grep 'XCURSOR_PATH' || {
            echo "launcher does not export cursor theme paths." >&2
            exit 1
          }

      - name: Upload snap
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-linux-amd64-snap
          path: ${{ steps.build-snap.outputs.snap }}

      - name: Verify snap version
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          SNAP_VERSION="$(unsquashfs -cat "${{ steps.build-snap.outputs.snap }}" meta/snap.yaml | python3 -c 'import sys; print(next(line.split(":", 1)[1].strip().strip("\"'\''") for line in sys.stdin if line.startswith("version:")))')"
          echo "Snap version: ${SNAP_VERSION}"
          echo "Release version: ${VERSION}"
          if [ "${SNAP_VERSION}" != "${VERSION}" ]; then
            echo "Packed snap version does not match release version." >&2
            exit 1
          fi

      - name: Choose Snap Store channel
        run: |
          if [[ "${VERSION}" == *-* ]]; then
            echo "SNAP_CHANNEL=edge" >> "$GITHUB_ENV"
          else
            echo "SNAP_CHANNEL=stable" >> "$GITHUB_ENV"
          fi

      - name: Publish snap to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -z "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            echo "SNAPCRAFT_STORE_CREDENTIALS is not set." >&2
            exit 1
          fi
          snapcraft upload --release="$SNAP_CHANNEL" "${{ steps.build-snap.outputs.snap }}"

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: [prepare, unit-tests]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ runner.arch }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-nuget-

      - name: Install Windows SDK (MakeAppx for MSIX)
        shell: pwsh
        run: |
          Write-Host "Installing Windows SDK (this may take 5-10 minutes)..."
          choco install -y windows-sdk-10.0 --no-progress 2>&1 | Select-String -Pattern "makeappx|MakeAppx|Installed" -ErrorAction SilentlyContinue
          Write-Host "Windows SDK installation complete"

      - name: Build Windows installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build-windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-windows-x64-installer
          path: artifacts/packages/*_setup.exe

      - name: Upload MSIX package
        uses: actions/upload-artifact@v5
        with:
          name: lumyn-windows-x64-msix
          path: artifacts/packages/*.msix

  # ── Publish GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Attach artifacts to release
    runs-on: ubuntu-latest
    needs: [prepare, linux-deb, linux-snap, windows-installer]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          # Flatten per-artifact subdirectories into one checksum manifest,
          # listing just the file basenames so it reads cleanly on the release.
          find . -type f ! -name 'checksums.sha256' -printf '%P\n' \
            | sort \
            | while read -r f; do sha256sum "$f"; done > checksums.sha256
          echo "Checksums:"
          cat checksums.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "Lumyn ${{ needs.prepare.outputs.version }}"
          files: |
            release-artifacts/**/*
            release-artifacts/checksums.sha256

  # ── Publish to Ubuntu PPA ──────────────────────────────────────────────────
  publish-ppa:
    name: Publish to Ubuntu PPA
    runs-on: ubuntu-latest
    needs: [prepare, unit-tests]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper-compat dput

      - name: Vendor NuGet packages
        run: |
          dotnet restore src/Lumyn.App/Lumyn.App.csproj \
            --packages ./packages

      - name: Stage Debian source packaging
        run: |
          cp -a packaging/debian debian

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_FP=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          echo "KEY_FP=${KEY_FP}" >> "$GITHUB_ENV"

      - name: Update debian/changelog
        run: |
          dch -v "${VERSION}-0piyushdoorwar1" --distribution resolute "Release version ${VERSION}"

      - name: Build source package
        run: |
          dpkg-buildpackage -S -d -us -uc

      - name: Sign source package
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cat > "$HOME/gpg-wrapper.sh" <<'EOF'
          #!/bin/sh
          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            exec gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" "$@"
          fi
          exec gpg --batch --yes "$@"
          EOF
          chmod 700 "$HOME/gpg-wrapper.sh"
          debsign -k "${KEY_FP}" -p "$HOME/gpg-wrapper.sh" ../*.changes

      - name: Create dput configuration
        run: |
          cat > ~/.dput.cf <<EOF
          [lumyn-ppa]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~piyushdoorwar/ubuntu/lumyn/
          login = anonymous
          allow_unsigned_uploads = 0
          EOF

      - name: Upload to PPA
        run: |
          dput lumyn-ppa ../*.changes
