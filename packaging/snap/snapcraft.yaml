name: lumyn
adopt-info: lumyn
icon: snap/gui/icon.svg
summary: A clean desktop media player
description: |
  Lumyn is a quiet, fast local video and audio player with a focused
  interface, mpv-powered playback, subtitle tools, playlists, bookmarks,
  screenshots, Chromecast support, and practical keyboard controls.

base: core24
grade: stable
confinement: strict

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

apps:
  lumyn:
    command: opt/lumyn/lumyn
    desktop: usr/share/applications/lumyn.desktop
    plugs:
      - audio-playback
      - desktop
      - desktop-legacy
      - home
      - network
      - network-bind
      - opengl
      - removable-media
      - screen-inhibit-control
      - wayland
      - x11
    environment:
      LD_LIBRARY_PATH: $SNAP/opt/lumyn:$SNAP/opt/lumyn/lib:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib/aarch64-linux-gnu:$SNAP/usr/lib:$LD_LIBRARY_PATH

parts:
  lumyn:
    plugin: nil
    source: .

    build-packages:
      - bash
      - ca-certificates
      - curl
      - git
      - libicu-dev

    stage-packages:
      - libicu74
      - libmpv2
      - libgl1
      - libglu1-mesa
      - libx11-6
      - libxcb1
      - libxext6
      - libxrandr2
      - libxrender1
      - libxi6
      - libxfixes3
      - libxcursor1
      - libxinerama1
      - libice6
      - libsm6
      - libasound2t64
      - libpulse0
      - fontconfig
      - fonts-inter
      - dbus

    override-build: |
      set -eu

      dotnet_dir="$CRAFT_PART_BUILD/.dotnet"
      mkdir -p "$dotnet_dir"

      curl -fsSL https://dot.net/v1/dotnet-install.sh -o "$CRAFT_PART_BUILD/dotnet-install.sh"
      bash "$CRAFT_PART_BUILD/dotnet-install.sh" --channel 10.0 --install-dir "$dotnet_dir"

      export PATH="$dotnet_dir:$PATH"

      version="${VERSION:-}"
      if [ -n "$version" ]; then
        version="${version#v}"
      elif tag="$(git describe --tags --exact-match 2>/dev/null)"; then
        version="${tag#v}"
      elif tag="$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null)"; then
        version="${tag#v}-dev"
      else
        version="0.0.0-dev"
      fi

      craftctl set version="$version"

      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64) dotnet_arch="x64" ;;
        arm64) dotnet_arch="arm64" ;;
        *) echo "Unsupported snap architecture: $CRAFT_ARCH_BUILD_FOR" >&2; exit 1 ;;
      esac

      dotnet restore Lumyn.sln

      dotnet publish src/Lumyn.App/Lumyn.App.csproj \
        -c Release \
        -r linux-$dotnet_arch \
        --self-contained true \
        -o "$CRAFT_PART_INSTALL/opt/lumyn" \
        -p:Version="$version" \
        -p:InformationalVersion="$version"

      mkdir -p "$CRAFT_PART_INSTALL/opt/lumyn/lib"

      install -Dm755 packaging/snap/lumyn-launcher \
        "$CRAFT_PART_INSTALL/opt/lumyn/lumyn"

      install -Dm644 src/Lumyn.App/Assets/Icons/lumyn.svg \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/lumyn.svg"

      install -Dm644 packaging/snap/gui/lumyn.desktop \
        "$CRAFT_PART_INSTALL/usr/share/applications/lumyn.desktop"

      sed -i 's|^Exec=.*|Exec=lumyn %U|' \
        "$CRAFT_PART_INSTALL/usr/share/applications/lumyn.desktop"

    override-prime: |
      set -eu

      craftctl default

      mkdir -p opt/lumyn/lib

      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64) arch_triplet="x86_64-linux-gnu" ;;
        arm64) arch_triplet="aarch64-linux-gnu" ;;
        *) echo "Unsupported snap architecture: $CRAFT_ARCH_BUILD_FOR" >&2; exit 1 ;;
      esac

      echo "Checking for libmpv in usr/lib/$arch_triplet"

      if [ -f "usr/lib/$arch_triplet/libmpv.so.2" ] || [ -L "usr/lib/$arch_triplet/libmpv.so.2" ]; then
        cp -aL usr/lib/$arch_triplet/libmpv.so* opt/lumyn/lib/
      else
        echo "ERROR: libmpv.so.2 was not staged into usr/lib/$arch_triplet" >&2
        echo "Available libmpv files:" >&2
        find usr lib -name "libmpv*" -print 2>/dev/null || true
        exit 1
      fi

      copy_library() {
        source="$1"
        target_dir="$2"
        resolved="$(readlink -f "$source")"
        base="$(basename "$resolved")"

        if [ ! -f "$target_dir/$base" ]; then
          cp -a "$resolved" "$target_dir/$base"
          chmod 755 "$target_dir/$base" || true
        fi

        link_name="$(basename "$source")"
        if [ "$link_name" != "$base" ] && [ ! -e "$target_dir/$link_name" ]; then
          ln -s "$base" "$target_dir/$link_name"
        fi
      }

      should_bundle_library() {
        base="$(basename "$1")"
        case "$base" in
          ld-linux*.so*|linux-vdso.so*|libc.so*|libm.so*|libdl.so*|libpthread.so*|librt.so*|libresolv.so*|libnsl.so*|libutil.so*)
            return 1
            ;;
        esac
        return 0
      }

      bundle_library_closure() {
        library="$1"
        queue_file="$(mktemp)"
        seen_file="$(mktemp)"
        printf '%s\n' "$library" > "$queue_file"

        while [ -s "$queue_file" ]; do
          current="$(sed -n '1p' "$queue_file")"
          sed -i '1d' "$queue_file"
          [ -f "$current" ] || continue

          resolved="$(readlink -f "$current")"
          if grep -Fxq "$resolved" "$seen_file"; then
            continue
          fi
          printf '%s\n' "$resolved" >> "$seen_file"

          if should_bundle_library "$resolved"; then
            copy_library "$current" opt/lumyn/lib
          fi

          ldd "$resolved" | awk '/=> \// { print $3 } /^[[:space:]]*\// { print $1 }' |
            while IFS= read -r dep; do
              if [ -n "$dep" ] && [ -f "$dep" ]; then
                if should_bundle_library "$dep"; then
                  printf '%s\n' "$dep" >> "$queue_file"
                fi
              fi
            done
        done

        rm -f "$queue_file" "$seen_file"
      }

      bundle_library_closure "usr/lib/$arch_triplet/libmpv.so.2"

      if [ -f opt/lumyn/lib/libmpv.so.2 ] && [ ! -e opt/lumyn/lib/libmpv.so ]; then
        ln -s libmpv.so.2 opt/lumyn/lib/libmpv.so
      fi

      if [ -f opt/lumyn/lib/libmpv.so.2 ] && [ ! -e opt/lumyn/libmpv.so.2 ]; then
        ln -s lib/libmpv.so.2 opt/lumyn/libmpv.so.2
      fi

      if [ -e opt/lumyn/libmpv.so.2 ] && [ ! -e opt/lumyn/libmpv.so ]; then
        ln -s libmpv.so.2 opt/lumyn/libmpv.so
      fi

      echo "Bundled libmpv files:"
      find opt/lumyn/lib -name "libmpv*" -print

      echo "Checking Lumyn launcher library paths:"
      grep 'LD_LIBRARY_PATH' opt/lumyn/lumyn
