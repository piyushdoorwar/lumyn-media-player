name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-linux-amd64-deb
          path: artifacts/packages/*.deb

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-windows-x64-installer
          path: artifacts/packages/*_setup.exe

  macos-zip:
    name: macOS app zip (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-15
          - rid: osx-x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: brew install mpv

      - name: Build app DMG
        run: RID=${{ matrix.rid }} ./scripts/build-macos.sh

      - name: Upload app DMG
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-macos-${{ matrix.rid }}
          path: artifacts/packages/*.dmg

  linux-flatpak:
    name: Linux Flatpak bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish .NET binary
        run: |
          dotnet restore Lumyn.sln
          dotnet build Lumyn.sln -c Release --no-restore
          dotnet publish src/Lumyn.App/Lumyn.App.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o packaging/flatpak/build-src

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lumyn-linux-x64.flatpak
          manifest-path: packaging/flatpak/io.github.piyushdoorwar.lumyn.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-linux-flatpak
          path: lumyn-linux-x64.flatpak

  github-release:
    name: Attach artifacts to release
    runs-on: ubuntu-latest
    needs: [linux-deb, linux-flatpak, windows-installer, macos-zip]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
