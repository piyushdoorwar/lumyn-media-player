  <rect x="14" y="174" width="292" height="5" rx="2.5" fill="#2C2C2C"/>
  <text x="14" y="198" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6A6560">--:--</text>
  <rect x="134" y="189" width="14" height="14" rx="2" fill="#807C79" opacity="0.82"/>
  <rect x="153" y="189" width="14" height="14" rx="2" fill="#807C79" opacity="0.82"/>
  <rect x="172" y="189" width="14" height="14" rx="2" fill="#807C79" opacity="0.82"/>
  <rect x="191" y="189" width="14" height="14" rx="2" fill="#807C79" opacity="0.82"/>
  <text x="294" y="198" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6A6560" text-anchor="end">--:--</text>
