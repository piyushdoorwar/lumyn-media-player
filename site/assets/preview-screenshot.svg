<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <rect width="320" height="220" rx="8" fill="#101010" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <rect width="320" height="38" rx="8" fill="#141414"/>
  <rect y="30" width="320" height="8" fill="#141414"/>
  <rect y="37" width="320" height="1" fill="rgba(255,255,255,0.06)"/>
  <image href="lumyn.svg" x="12" y="9" width="20" height="20"/>
  <text x="40" y="24" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#DEDAD5">sample-video.mkv — Lumyn</text>
  <circle cx="285" cy="19" r="5.5" fill="#4c4c4c"/>
  <circle cx="299" cy="19" r="5.5" fill="#4c4c4c"/>
  <circle cx="313" cy="19" r="5.5" fill="#4c4c4c"/>

  <rect x="0" y="38" width="320" height="130" fill="#151515"/>
  <radialGradient id="glow-sc" cx="80%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#3a9b4b" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#151515" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="38" width="320" height="130" fill="url(#glow-sc)"/>

  <!-- screenshot flash/frame -->
  <rect x="18" y="48" width="180" height="110" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- mock frame content -->
  <rect x="24" y="54" width="168" height="98" rx="2" fill="#1C1C1C"/>
  <rect x="24" y="54" width="168" height="98" fill="url(#glow-sc-inner)"/>
  <radialGradient id="glow-sc-inner" cx="30%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#3a9b4b" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <text x="108" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="800" fill="#F7F5F3" opacity="0.6">Loop, seek, screenshot —</text>
  <text x="108" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="800" fill="#F7F5F3" opacity="0.6">always one key away.</text>

  <!-- saved badge -->
  <rect x="210" y="66" width="96" height="30" rx="5" fill="#1E2A1E" stroke="rgba(58,155,75,0.5)" stroke-width="1"/>
  <text x="223" y="79" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#3a9b4b">✓ Screenshot saved</text>
  <text x="223" y="91" font-family="system-ui,sans-serif" font-size="7" fill="#6A9B6A">screenshot_001.png</text>

  <!-- shortcut hint -->
  <rect x="210" y="104" width="96" height="24" rx="4" fill="#1A1A1A" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="225" y="120" font-family="system-ui,sans-serif" font-size="9" fill="#807C79">Alt + I</text>
  <rect x="264" y="108" width="36" height="14" rx="2" fill="#252525" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="275" y="118" font-family="system-ui,sans-serif" font-size="7" fill="#807C79">⌨</text>

  <rect x="0" y="168" width="320" height="52" fill="url(#ctrl-grad-sc)"/>
  <linearGradient id="ctrl-grad-sc" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#111111"/>
    <stop offset="100%" stop-color="#050505"/>
  </linearGradient>
  <rect x="14" y="174" width="292" height="5" rx="2.5" fill="#3a3a3a"/>
  <rect x="14" y="174" width="190" height="5" rx="2.5" fill="#3a9b4b"/>
  <!-- chapter ticks -->
  <rect x="105" y="172" width="1" height="9" rx="0.5" fill="rgba(247,245,243,0.5)"/>
  <rect x="183" y="172" width="1" height="9" rx="0.5" fill="rgba(247,245,243,0.5)"/>
  <rect x="238" y="172" width="1" height="9" rx="0.5" fill="rgba(247,245,243,0.5)"/>
  <text x="14" y="198" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6A6560">38:12</text>
