app-id: io.github.piyushdoorwar.lumyn
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: lumyn

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU / video decoding
  - --device=dri
  # Audio
  - --socket=pulseaudio
  # Chromecast casting: mDNS discovery and local HTTP media streaming
  - --share=network
  # Filesystem — read home for media, write Pictures for screenshots
  - --filesystem=home:ro
  - --filesystem=xdg-pictures:create
  # Portals (file chooser, etc.)
  - --talk-name=org.freedesktop.portal.Desktop

modules:

  # ── FFmpeg ──────────────────────────────────────────────────────────────────
  # Used at runtime for Chromecast transcoding: remuxes unsupported containers
  # (MKV, AVI, MOV, etc.) to fragmented MP4 that Chromecast's Default Media
  # Receiver accepts.  Only the encoders/demuxers we actually use are compiled in
  # to keep the size down.
  - name: ffmpeg
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --disable-debug
      - --disable-doc
      - --disable-static
      - --enable-shared
      - --disable-ffplay
      - --disable-ffprobe
      - --disable-everything
      # Containers we read from
      - --enable-demuxer=matroska,avi,mov,mpegts,flv,asf
      # Container we write to (fragmented MP4)
      - --enable-muxer=mp4,mov
      # Audio: encode source audio to AAC for Chromecast
      - --enable-encoder=aac
      # Audio decoders for common formats found in the above containers
      - --enable-decoder=aac,mp3,ac3,eac3,dts,vorbis,opus,flac,alac,pcm_s16le,pcm_s24le,pcm_s32le,pcm_f32le
      # Parsers needed for video copy (-c:v copy) and audio handling
      - --enable-parser=h264,hevc,vp8,vp9,aac,mp3,ac3,opus,vorbis
      # Bitstream filters for correct AAC-in-MP4 packaging
      - --enable-bsf=aac_adtstoasc,h264_mp4toannexb,hevc_mp4toannexb
      # Protocols: local file input and pipe:1 stdout output
      - --enable-protocol=file,pipe
    sources:
      - type: git
        url: https://github.com/FFmpeg/FFmpeg.git
        tag: n7.1.1

  # ── libmpv ─────────────────────────────────────────────────────────────────
  # Built from source so we control the version and keep the sandbox clean.
  # libplacebo is disabled to avoid the shaderc/glslang chain; mpv falls back
  # to its legacy OpenGL renderer which is sufficient for the render API Lumyn uses.
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Dlibplacebo=disabled
      - -Dvulkan=disabled
      - -Dgl=enabled
      - -Dwayland=enabled
      - -Dx11=enabled
      - -Dpulse=enabled
      - -Dalsa=enabled
      - -Dmanpage-build=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.39.0

  # ── Lumyn ───────────────────────────────────────────────────────────────────
  # The .NET binary is pre-built by the CI/build script (dotnet publish
  # --self-contained -r linux-x64) and staged in packaging/flatpak/build-src/
  # before flatpak-builder is invoked.
  - name: lumyn
    buildsystem: simple
    sources:
      # Pre-built self-contained .NET binary + runtime files
      - type: dir
        path: build-src
      # Desktop entry, AppStream metainfo, and icon are in a separate subdir
      - type: file
        path: io.github.piyushdoorwar.lumyn.desktop
        dest: meta
      - type: file
        path: io.github.piyushdoorwar.lumyn.metainfo.xml
        dest: meta
      - type: file
        path: ../../src/Lumyn.App/Assets/Icons/lumyn.svg
        dest: meta
        dest-filename: io.github.piyushdoorwar.lumyn.svg
    build-commands:
      # Install the .NET runtime tree to /app/lib/lumyn/
      - mkdir -p /app/lib/lumyn
      - cp -r . /app/lib/lumyn/
      - rm -rf /app/lib/lumyn/meta
      - chmod +x /app/lib/lumyn/Lumyn
      # Wrapper script at /app/bin/lumyn so the binary finds its assemblies
      - printf '#!/bin/sh\nexec /app/lib/lumyn/Lumyn "$@"\n' > /tmp/lumyn-launch
      - install -Dm755 /tmp/lumyn-launch /app/bin/lumyn
      # Desktop integration
      - install -Dm644 meta/io.github.piyushdoorwar.lumyn.desktop
          /app/share/applications/io.github.piyushdoorwar.lumyn.desktop
      - install -Dm644 meta/io.github.piyushdoorwar.lumyn.metainfo.xml
          /app/share/metainfo/io.github.piyushdoorwar.lumyn.metainfo.xml
      - install -Dm644 meta/io.github.piyushdoorwar.lumyn.svg
          /app/share/icons/hicolor/scalable/apps/io.github.piyushdoorwar.lumyn.svg
