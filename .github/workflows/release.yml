name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 1.2.3 or 1.2.3-beta.1)'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  # ── Determine version from tag or manual input ────────────────────────────
  prepare:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Extract version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip 'v' prefix: v1.2.3 -> 1.2.3
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── Platform builds ───────────────────────────────────────────────────────
  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libmpv2
          version: 1.0

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-linux-amd64-deb
          path: artifacts/packages/*.deb

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Windows SDK (MakeAppx for MSIX)
        shell: pwsh
        run: |
          Write-Host "Installing Windows SDK (this may take 5-10 minutes)..."
          choco install -y windows-sdk-10.0 --no-progress 2>&1 | Select-String -Pattern "makeappx|MakeAppx|Installed" -ErrorAction SilentlyContinue
          Write-Host "Windows SDK installation complete"

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-windows-x64-installer
          path: artifacts/packages/*_setup.exe

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-windows-x64-msix
          path: artifacts/packages/*.msix

  macos-zip:
    name: macOS app zip (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-15
          - rid: osx-x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: brew install mpv ffmpeg

      - name: Build app DMG
        run: RID=${{ matrix.rid }} ./scripts/build-macos.sh

      - name: Upload app DMG
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-macos-${{ matrix.rid }}
          path: artifacts/packages/*.dmg

  # ── Publish GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Attach artifacts to release
    runs-on: ubuntu-latest
    needs: [prepare, linux-deb, windows-installer, macos-zip]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Lumyn ${{ needs.prepare.outputs.version }}"
          files: release-artifacts/**/*
