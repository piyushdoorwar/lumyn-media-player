  <rect x="112" y="70" width="92" height="88" rx="5" fill="#151515" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="112" y="70" width="92" height="56" rx="5" fill="#0E0E1A"/>
  <rect x="112" y="70" width="92" height="56" rx="5" fill="url(#glow-rp-2)"/>
  <!-- scene -->
  <ellipse cx="148" cy="92" rx="10" ry="12" fill="rgba(255,255,255,0.05)"/>
  <rect x="140" y="103" width="16" height="20" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="163" y="96" width="24" height="30" rx="3" fill="rgba(255,255,255,0.025)"/>
