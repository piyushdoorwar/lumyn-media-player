name: Build release artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: "0.0.0-dev"

jobs:
  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev

      - name: Build deb
        run: ./scripts/build-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-linux-amd64-deb
          path: artifacts/packages/*.deb

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-windows-x64-installer
          path: artifacts/packages/*_setup.exe

  macos-zip:
    name: macOS app zip (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-15
          - rid: osx-x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native packaging inputs
        run: brew install mpv

      - name: Build app DMG
        run: RID=${{ matrix.rid }} ./scripts/build-macos.sh

      - name: Upload app DMG
        uses: actions/upload-artifact@v4
        with:
          name: lumyn-macos-${{ matrix.rid }}
          path: artifacts/packages/*.dmg
